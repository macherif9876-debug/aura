<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes reflect { 0% { left: -100%; } 100% { left: 150%; } }
        
        .aura-logo-light {
            position: relative;
            display: inline-block;
            font-size: 3.5rem;
            font-weight: 900;
            font-style: italic;
            color: #1a1a1a;
            padding: 10px 40px;
            background: rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            border: 1px solid rgba(0,0,0,0.08);
            overflow: hidden;
            letter-spacing: -3px;
        }

        .aura-logo-light::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-25deg);
            animation: reflect 3s infinite;
        }

        .input-premium {
            background: #f8fafc;
            border: 2px solid #f1f5f9;
            transition: all 0.3s ease;
        }

        .input-premium:focus {
            background: #ffffff;
            border-color: #000000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            outline: none;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 24px;
            font-weight: 700;
            font-size: 14px;
            color: #1a1a1a;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-google:hover {
            border-color: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .btn-google:active { transform: scale(0.98); }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 16px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
    </style>
</head>
<body class="bg-[#ffffff] min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md text-center">

        <!-- LOGO -->
        <div class="mb-10">
            <div class="aura-logo-light">AURA</div>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[4px] mt-4">Luxe & Proximité</p>
        </div>

        <!-- MESSAGE D'ERREUR -->
        {% if error %}
        <div class="mb-6 p-4 bg-red-50 text-red-600 rounded-2xl text-xs font-bold border border-red-100">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <!-- FLASH MESSAGES -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="mb-4 p-4 rounded-2xl text-xs font-bold border
              {% if category == 'error' %}bg-red-50 text-red-600 border-red-100
              {% else %}bg-green-50 text-green-600 border-green-100{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        {% endwith %}

        <!-- ✅ BOUTON GOOGLE -->
        <a href="/auth/google" class="btn-google mb-2">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Continuer avec Google
        </a>

        <!-- SÉPARATEUR -->
        <div class="divider">ou</div>

        <!-- FORMULAIRE EMAIL / MOT DE PASSE -->
        <form method="POST" class="space-y-4">
            <input type="email" name="email" placeholder="Votre email" required 
                   class="w-full p-5 rounded-2xl text-black font-medium input-premium">
            
            <input type="password" name="password" placeholder="Mot de passe" required 
                   class="w-full p-5 rounded-2xl text-black font-medium input-premium">
            
            <button type="submit" 
                    class="w-full py-5 bg-black text-white rounded-3xl font-black uppercase tracking-widest shadow-2xl active:scale-95 transition-all mt-2">
                Se connecter
            </button>
        </form>

        <p class="mt-8 text-slate-400 font-medium text-sm">
            Nouveau chez AURA ? 
            <a href="/signup" class="text-black font-black underline ml-1">Créer un compte</a>
        </p>
    </div>
</body>
</html>
