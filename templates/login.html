<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes reflect { 0% { left: -100%; } 100% { left: 150%; } }
        
        .aura-logo-light {
            position: relative;
            display: inline-block;
            font-size: 3.5rem;
            font-weight: 900;
            font-style: italic;
            color: #1a1a1a;
            padding: 10px 40px;
            background: rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            border: 1px solid rgba(0,0,0,0.08);
            overflow: hidden;
            letter-spacing: -3px;
        }

        .aura-logo-light::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-25deg);
            animation: reflect 3s infinite;
        }

        .input-premium {
            background: #f8fafc;
            border: 2px solid #f1f5f9;
            transition: all 0.3s ease;
        }

        .input-premium:focus {
            background: #ffffff;
            border-color: #000000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="bg-[#ffffff] min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md text-center">
        <div class="mb-12">
            <div class="aura-logo-light">AURA</div>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[4px] mt-4">Luxe & Proximité</p>
        </div>

        {% if error %}
        <div class="mb-6 p-4 bg-red-50 text-red-600 rounded-2xl text-xs font-bold border border-red-100">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-4">
            <input type="email" name="email" placeholder="Votre email" required 
                   class="w-full p-5 rounded-2xl outline-none text-black font-medium input-premium">
            
            <input type="password" name="password" placeholder="Mot de passe" required 
                   class="w-full p-5 rounded-2xl outline-none text-black font-medium input-premium">
            
            <button type="submit" class="w-full py-5 bg-black text-white rounded-3xl font-black uppercase tracking-widest shadow-2xl active:scale-95 transition-all mt-4">
                Se connecter
            </button>
        </form>

        <p class="mt-10 text-slate-400 font-medium text-sm">
            Nouveau chez AURA ? <a href="/signup" class="text-black font-black underline ml-1">Créer un compte</a>
        </p>
    </div>
</body>
</html>
