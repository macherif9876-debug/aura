<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA - Inscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes reflect { 0% { left: -100%; } 100% { left: 150%; } }
        .aura-logo-small {
            position: relative; display: inline-block;
            font-size: 2.2rem; font-weight: 900; font-style: italic;
            color: #1a1a1a; padding: 5px 20px;
            background: rgba(0, 0, 0, 0.03); backdrop-filter: blur(10px);
            border-radius: 15px; border: 1px solid rgba(0,0,0,0.05);
            overflow: hidden; letter-spacing: -2px;
        }
        .aura-logo-small::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
            transform: skewX(-25deg); animation: reflect 3.5s infinite;
        }
        .field-light { background: #f8fafc; border: 1px solid #e2e8f0; }
        .field-light:focus { border-color: #000; background: white; }
    </style>
</head>
<body class="bg-white min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="aura-logo-small">AURA</div>
            <h1 class="text-xl font-black mt-4 text-slate-900">Créez votre profil</h1>
        </div>

        {% if error %}
        <div class="mb-4 p-4 bg-red-50 text-red-600 rounded-2xl text-xs font-bold border border-red-100">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-3">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" name="prenom" placeholder="Prénom" required class="w-full p-4 rounded-2xl outline-none field-light transition-all">
                <input type="text" name="nom" placeholder="Nom" required class="w-full p-4 rounded-2xl outline-none field-light transition-all">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <select name="pays_id" id="pays_select" required class="w-full p-4 rounded-2xl outline-none field-light transition-all text-slate-500">
                    <option value="" disabled selected>Pays</option>
                    {% for p in pays %}
                        <option value="{{ p.id }}">
                            {% if 'Sénégal' in p.nom_pays %}🇸🇳 {% elif 'Guinée' in p.nom_pays %}🇬🇳 {% endif %}
                            {{ p.nom_pays }}
                        </option>
                    {% endfor %}
                </select>

                <select name="region_id" id="region_select" required class="w-full p-4 rounded-2xl outline-none field-light transition-all text-slate-500">
                    <option value="" disabled selected>Région</option>
                    {% for r in regions %}
                        <option value="{{ r.id }}" data-pays="{{ r.pays_id }}" class="region-option" style="display:none;">
                            {{ r.nom_region }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <input type="tel" name="phone" placeholder="Numéro de téléphone" required class="w-full p-4 rounded-2xl outline-none field-light transition-all">
            <input type="email" name="email" placeholder="Adresse email" required class="w-full p-4 rounded-2xl outline-none field-light transition-all">
            <input type="password" name="password" placeholder="Mot de passe (8+ caractères)" required class="w-full p-4 rounded-2xl outline-none field-light transition-all">

            <button type="submit" class="w-full py-5 bg-black text-white rounded-3xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all mt-4">
                Rejoindre l'expérience
            </button>
        </form>

        <p class="mt-6 text-center text-slate-400 font-medium text-sm">
            Déjà inscrit ? <a href="/login" class="text-black font-black underline ml-1">Se connecter</a>
        </p>
    </div>

    <script>
        const paysSelect = document.getElementById('pays_select');
        const regionSelect = document.getElementById('region_select');
        const regionOptions = document.querySelectorAll('.region-option');

        paysSelect.addEventListener('change', function() {
            const selectedPaysId = this.value;
            
            // On remet le menu région à zéro
            regionSelect.value = "";
            
            // On cache tout d'abord toutes les régions
            regionOptions.forEach(opt => {
                if (opt.getAttribute('data-pays') === selectedPaysId) {
                    opt.style.display = 'block'; // On affiche si le pays correspond
                } else {
                    opt.style.display = 'none'; // On cache sinon
                }
            });
        });
    </script>
</body>
</html>
