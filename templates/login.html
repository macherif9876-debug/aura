<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Aura - Inscription Sécurisée</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #000; text-align: center; margin-bottom: 10px; }
        .welcome-msg { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Aura</h2>
        <p class="welcome-msg">Ravi de vous revoir !<br>Préparez-vous à vivre une expérience de commerce fluide et flexible.</p>
        
        <div id="step1">
            <input type="text" id="prenom" placeholder="Prénom" required>
            <input type="text" id="nom" placeholder="Nom" required>
            <input type="email" id="email" placeholder="Adresse e-mail" required>
            <input type="tel" id="tel" placeholder="Numéro de téléphone" required>
            <input type="password" id="pass" placeholder="Mot de passe" required>
            <button onclick="goToStep2()">Suivant : Localisation</button>
        </div>

        <div id="step2" class="hidden">
            <p>Filtrage par résidence :</p>
            <select id="pays" onchange="updateRegions()">
                <option value="">Sélectionnez votre pays</option>
                <option value="Guinée">Guinée</option>
                <option value="Sénégal">Sénégal</option>
            </select>
            <select id="region">
                <option value="">Sélectionnez votre région</option>
            </select>
            <button onclick="submitForm()">Finaliser mon inscription</button>
            <p style="text-align:center; font-size: 12px; margin-top:10px;"><a href="#" onclick="goToStep1()" style="color: #28a745;">Retour</a></p>
        </div>
    </div>

    <script>
        const regions = { "Guinée": ["Conakry", "Labé"], "Sénégal": ["Dakar", "Saint-Louis"] };
        function goToStep2() { document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden'); }
        function goToStep1() { document.getElementById('step2').classList.add('hidden'); document.getElementById('step1').classList.remove('hidden'); }
        function updateRegions() {
            const pays = document.getElementById('pays').value;
            const select = document.getElementById('region');
            select.innerHTML = '<option value="">Sélectionnez votre région</option>';
            if(regions[pays]) { regions[pays].forEach(r => { let o = document.createElement('option'); o.value = r; o.innerText = r; select.appendChild(o); }); }
        }
        function submitForm() { alert("Inscription Aura envoyée ! Vérifiez votre e-mail."); }
    </script>
</body>
</html>
