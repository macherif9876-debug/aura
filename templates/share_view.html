<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ p.nom }} | AURA ✨</title>
    <meta property="og:title" content="{{ p.nom }} - {{ p.prix }} FCFA">
    <meta property="og:image" content="{{ p.image_url }}">
    <meta property="og:description" content="Découvrez ce produit exclusif sur l'application AURA.">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="max-w-md w-full bg-white rounded-[50px] shadow-2xl overflow-hidden relative border-[6px] border-white">
        <div class="absolute top-6 left-6 z-10 bg-blue-600 text-white px-4 py-2 rounded-full font-black italic text-[10px] shadow-xl uppercase tracking-widest">
            AURA Official ✨
        </div>

        <img src="{{ p.image_url }}" class="w-full h-96 object-cover rounded-b-[40px]">

        <div class="p-8 text-center">
            <h1 class="text-3xl font-black italic uppercase text-slate-900 mb-2 leading-none">{{ p.nom }}</h1>
            <p class="text-blue-600 font-black text-2xl mb-6">{{ p.prix }} FCFA</p>
            
            <p class="text-slate-500 text-sm mb-8 px-4">{{ p.description }}</p>

            <div class="space-y-3">
                <a href="https://ton-lien-playstore.com" class="block bg-black text-white p-5 rounded-3xl font-black uppercase text-xs tracking-widest shadow-xl">
                    Acheter dans l'App 📲
                </a>
                <p class="text-[10px] font-bold text-slate-400 uppercase">Livraison Rapide & Paiement Sécurisé</p>
            </div>
        </div>
    </div>

</body>
</html>
